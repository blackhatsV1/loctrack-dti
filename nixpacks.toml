[variables]
NIXPACKS_PHP_ROOT_DIR = "public"
NIXPACKS_PHP_FALLBACK_PATH = "/index.php"

[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "nodejs_20", "nginx"]
cmds = ["chmod -R 775 storage bootstrap/cache"]

[phases.install]
cmds = ["composer install --no-interaction --prefer-dist --optimize-autoloader"]

[phases.build]
cmds = ["npm install", "npm run build"]
